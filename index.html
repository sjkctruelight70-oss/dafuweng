<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>财富增值大冒险 19.0 - 理财实验室(学生端)</title>
    <style>
        :root {
            --cyan: #00d2d3; --yellow: #f1c40f; --red: #ff6b6b; --green: #1dd1a1; --purple: #a29bfe;
            --p1: #ff4757; --p2: #2ed573; --p3: #1e90ff; --p4: #ffa502; --p5: #ff9ff3;
            --dark: #2c3e50;
        }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'PingFang SC', sans-serif; background: #ecf0f1; display: flex; flex-direction: column; }
        
        /* 登录设置界面 */
        #setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .setup-card { background: white; padding: 35px; border-radius: 25px; width: 550px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .p-input { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; flex: 1; }

        /* 游戏主体排版 */
        #game-header { height: 50px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); z-index: 100; flex-shrink: 0; }
        #main-container { flex: 1; display: flex; overflow: hidden; }
        #side-panel { width: 280px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; }
        #log { flex: 1; overflow-y: auto; background: var(--dark); border-radius: 10px; padding: 10px; font-size: 12px; color: #00d2d3; line-height: 1.6; font-family: monospace; }
        
        #board-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        #grid { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(5, 1fr); gap: 6px; width: 98%; height: 95%; max-width: 1100px; }
        
        .tile { background: white; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 3px 0 #bdc3c7; font-weight: bold; font-size: 13px; color: white; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }
        .tile.cyan { background: var(--cyan); } .tile.yellow { background: var(--yellow); } .tile.red { background: var(--red); } .tile.green { background: var(--green); } .tile.purple { background: var(--purple); }
        .tile.start { background: var(--dark); color: gold; border: 2px solid gold; box-shadow: 0 3px 0 #000; }

        .pawn-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 1fr; padding: 4px; box-sizing: border-box; }
        .pawn { width: 18px; height: 18px; border-radius: 50%; border: 2px solid white; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .pawn.frozen { filter: grayscale(1) contrast(0.5); border-color: red; animation: none !important; }

        /* 底部状态 */
        #status-bar { height: 140px; background: white; border-top: 1px solid #ddd; display: flex; padding: 10px; gap: 10px; flex-shrink: 0; overflow-x: auto; }
        .p-card { min-width: 200px; flex: 1; border-radius: 15px; padding: 10px; border-top: 8px solid #ccc; background: #f8f9fa; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; justify-content: center; }
        .p-card.active { background: white; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); transform: translateY(-5px); border-top-width: 12px; }
        .p-name-link { font-weight: bold; color: #2980b9; text-decoration: underline; font-size: 14px; }
        .money { font-size: 22px; font-weight: bold; margin: 2px 0; }
        .detail { font-size: 10px; color: #7f8c8d; }

        #dice-box { width: 75px; height: 75px; background: var(--dark); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 38px; margin: 10px auto; cursor: pointer; }
        .dice-rolling { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px,1px); } 50% { transform: translate(-1px,-1px); } 100% { transform: translate(1px,-1px); } }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal { background: white; width: 90%; max-width: 550px; padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #fff; border: 2px solid #eee; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 17px; }
        .choice-btn:hover { border-color: var(--cyan); background: #f0fbff; transform: scale(1.02); }

        .slider-container { margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 15px; }
        #save-slider { width: 100%; cursor: pointer; }
        .slider-val { font-size: 28px; font-weight: bold; color: var(--green); }
        .history-list { text-align: left; list-style: none; padding: 0; }
        .history-list li { padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <h2 style="text-align:center; margin-bottom:20px;">🎮 理财实验室 · 小组登录</h2>
        <div style="margin-bottom:25px; text-align:center">
            <b>小组编号：</b><input type="text" id="group-id" placeholder="PC-1" style="width:120px; font-size:18px; text-align:center">
        </div>
        <div id="p-inputs">
            <div class="p-input"><input type="text" placeholder="玩家1姓名" value="玩家 1"> <select class="lv"><option value="1">Lv1 基础</option><option value="2">Lv2 标准</option><option value="3">Lv3 挑战</option></select></div>
            <div class="p-input"><input type="text" placeholder="玩家2姓名" value="玩家 2"> <select class="lv"><option value="1">Lv1</option><option value="2" selected>Lv2</option><option value="3">Lv3</option></select></div>
            <div class="p-input"><input type="text" placeholder="玩家3姓名"> <select class="lv"><option value="1">Lv1</option><option value="2">Lv2</option><option value="3">Lv3</option></select></div>
            <div class="p-input"><input type="text" placeholder="玩家4姓名"> <select class="lv"><option value="1">Lv1</option><option value="2">Lv2</option><option value="3">Lv3</option></select></div>
            <div class="p-input"><input type="text" placeholder="玩家5姓名"> <select class="lv"><option value="1">Lv1</option><option value="2">Lv2</option><option value="3">Lv3</option></select></div>
        </div>
        <button onclick="game.startGame()" style="width:100%; padding:18px; background:var(--green); color:white; border:none; border-radius:12px; font-weight:bold; font-size:20px; cursor:pointer; margin-top:15px;">进入理财大冒险</button>
    </div>
</div>

<div id="game-header">
    <div id="display-group" style="font-weight:bold; font-size:18px">小组: -</div>
    <div id="turn-info" style="font-weight:bold; color:var(--red); font-size:20px">同步中...</div>
    <div id="teacher-msg" style="color:#27ae60; font-weight:bold">信号正常 🟢</div>
</div>

<div id="main-container">
    <div id="side-panel">
        <div id="round-tag" style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">回合: 1</div>
        <div id="dice-box" onclick="game.startRoll()">🎲</div>
        <div id="log"></div>
    </div>
    <div id="board-area"><div id="grid"></div></div>
</div>

<div id="status-bar"></div>

<div id="modal-overlay">
    <div class="modal">
        <h2 id="m-title"></h2>
        <div id="m-body"></div>
        <div id="dynamic-content"></div>
        <div id="m-opts"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAYVSpY_YYquayLS9jydw8awzJ5GX7GZIk",
        authDomain: "dafuweng-7254e.firebaseapp.com",
        projectId: "dafuweng-7254e",
        storageBucket: "dafuweng-7254e.firebasestorage.app",
        messagingSenderId: "400417510898",
        appId: "1:400417510898:web:72dbe5fe70b8024d3f476b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const startTime = Date.now(); // 记录页面加载时间

    const URLS = {
        questions: "https://raw.githubusercontent.com/sjkctruelight70-oss/dafuweng/main/question.json",
        events: "https://raw.githubusercontent.com/sjkctruelight70-oss/dafuweng/main/events.json"
    };

    class GameEngine {
        constructor() {
            this.players = [];
            this.currentPlayer = 0;
            this.round = 1;
            this.db = { questions: null, events: null };
            this.tiles = [];
            this.groupId = "";
            this.isEnding = false;
            this.finalTurns = 0;
            this.isMoving = false;
            this.init();
        }

        async init() {
            try {
                const [qRes, eRes] = await Promise.all([fetch(URLS.questions), fetch(URLS.events)]);
                let qText = (await qRes.text()).trim();
                let eText = (await eRes.text()).trim();
                qText = qText.substring(qText.indexOf('{'), qText.lastIndexOf('}') + 1);
                eText = eText.substring(eText.indexOf('{'), eText.lastIndexOf('}') + 1);
                this.db.questions = JSON.parse(qText);
                this.db.events = JSON.parse(eText).events;
                
                onSnapshot(doc(db, "control", "gameStatus"), (sn) => {
                    const d = sn.data();
                    if(!d) return;
                    // 只有指令发生的时间晚于页面加载时间，才执行
                    if(d.timestamp > startTime) {
                        if(d.command === "end") { this.isEnding = true; document.getElementById('teacher-msg').innerText = "🏁 老师已下令结算"; document.getElementById('teacher-msg').style.color="red"; }
                        else if(d.command === "reset") location.reload();
                    }
                });
            } catch (e) { alert("数据加载失败，请检查 GitHub 链接。"); }
        }

        startGame() {
            this.groupId = document.getElementById('group-id').value.trim() || "GroupX";
            document.getElementById('display-group').innerText = "小组: " + this.groupId;
            const colors = ['var(--p1)', 'var(--p2)', 'var(--p3)', 'var(--p4)', 'var(--p5)'];
            document.querySelectorAll('.p-input').forEach((row, i) => {
                const name = row.querySelector('input').value;
                const lv = parseInt(row.querySelector('select').value);
                if(name) this.players.push({
                    id: i+1, name, level: lv, color: colors[i],
                    money: 5000, pos: 0, salary: 200, history: [],
                    assets: [], loans: [], savings: [], frozen: 0,
                    perks: { move: 1, boost: 1, shield: false }
                });
            });
            if(this.players.length < 2) return alert("最少需要2名玩家");
            document.getElementById('setup-screen').style.display = 'none';
            this.renderGrid();
            this.updateUI();
            this.sync();
        }

        renderGrid() {
            const grid = document.getElementById('grid');
            let pool = [...Array(15).fill('cyan'), ...Array(10).fill('yellow'), ...Array(7).fill('red'), ...Array(10).fill('green'), ...Array(7).fill('purple')];
            pool = pool.sort(() => Math.random() - 0.5); pool.unshift('start');
            pool.forEach((type, i) => {
                const tile = document.createElement('div');
                tile.className = `tile ${type}`; tile.id = `tile-${i}`;
                tile.innerHTML = `<span>${i===0?'START':i}</span><div class="pawn-container" id="p-box-${i}"></div>`;
                grid.appendChild(tile); this.tiles.push(type);
            });
            this.updatePawns();
        }

        updatePawns() {
            document.querySelectorAll('.pawn-container').forEach(c => c.innerHTML = '');
            this.players.forEach(p => {
                const box = document.getElementById(`p-box-${p.pos}`);
                if(!box) return;
                const dot = document.createElement('div');
                dot.className = `pawn ${p.frozen > 0 ? 'frozen' : ''}`;
                dot.style.background = p.color;
                if(this.players[this.currentPlayer].id === p.id) { 
                    dot.style.boxShadow = "0 0 15px white"; 
                    dot.style.transform = "scale(1.4)"; 
                    dot.style.zIndex = "10";
                }
                box.appendChild(dot);
            });
        }

        startRoll() {
            if(this.isMoving) return;
            const p = this.players[this.currentPlayer];
            if(p.frozen > 0) {
                p.frozen--; this.log(`${p.name} 停工中，还剩 ${p.frozen} 回合`, "warn");
                p.money += p.salary; this.record(p, "领取停工工资", p.salary);
                return this.nextTurn();
            }
            const btn = document.getElementById('dice-box'); btn.classList.add('dice-rolling');
            let count = 0;
            const timer = setInterval(() => {
                btn.innerText = Math.floor(Math.random()*6)+1;
                if(++count > 10) { clearInterval(timer); btn.classList.remove('dice-rolling'); this.animateMove(parseInt(btn.innerText)); }
            }, 80);
        }

        async animateMove(steps) {
            this.isMoving = true;
            const p = this.players[this.currentPlayer];
            const final = Math.round(steps * p.perks.move);
            this.log(`${p.name} 掷出 ${steps} ${p.perks.move>1?'(加成后'+final+')':''}`);
            for(let i=0; i<final; i++) {
                p.pos = (p.pos + 1) % 50; this.updatePawns();
                if(p.pos === 0) { p.money += p.salary; this.record(p, "领取月薪", p.salary); this.updateUI(); }
                await new Promise(r => setTimeout(r, 200));
            }
            this.isMoving = false; this.handleLanding();
        }

        handleLanding() {
            const p = this.players[this.currentPlayer];
            const type = this.tiles[p.pos];
            if(type === 'start') {
                p.money += 200; this.record(p, "精准降落奖", 200);
                this.showModal("落点奖励", "+200💰", [{text:"收下", cb:()=>this.nextTurn()}]);
            } else if(['cyan', 'yellow', 'red'].includes(type)) {
                if(type === 'red' && Math.random() > 0.5) this.processEvent('red');
                else this.processQuestion(type);
            } else this.processEvent(type);
        }

        processQuestion(baseType) {
            const p = this.players[this.currentPlayer];
            let qType = baseType;
            const rand = Math.random();
            // 抽题概率逻辑
            if(p.level === 1) qType = rand < 0.7 ? 'cyan' : (rand < 0.9 ? 'yellow' : 'red');
            else if(p.level === 2) qType = rand < 0.6 ? 'cyan' : (rand < 0.85 ? 'yellow' : 'red');
            else qType = rand < 0.5 ? 'cyan' : (rand < 0.8 ? 'yellow' : 'red');

            const q = this.db.questions[qType][Math.floor(Math.random()*this.db.questions[qType].length)];
            let reward = Math.floor(q.reward * p.perks.boost);
            this.showModal(`${qType.toUpperCase()}挑战 - ${p.name}(Lv${p.level})`, q.q, q.options.map((t, i) => ({
                text: t,
                cb: () => {
                    if(i === q.correct) { p.money += reward; this.record(p, "答题正确", reward); this.log(`${p.name} 答对了 +${reward}`); }
                    else { 
                        let rate = p.level === 1 ? 0.5 : (p.level === 3 ? 0.7 : 0.6);
                        let loss = Math.floor(reward * rate);
                        p.money -= loss; this.record(p, "答题错误", -loss); this.log(`${p.name} 答错了 -${loss}`);
                    }
                    this.nextTurn();
                }
            })));
        }

        processEvent(color) {
            const p = this.players[this.currentPlayer];
            const pool = this.db.events.filter(e => e.color_type === color);
            const ev = pool[Math.floor(Math.random()*pool.length)];
            if(ev.type === "save") return this.showSaveSlider(p, ev);
            if(ev.type === "accident" && p.perks.shield) {
                p.perks.shield = false; return this.showModal(ev.title, ev.text + "\n\n🛡️ 护盾抵御了损失！", [{text:"太好了", cb:()=>this.nextTurn()}]);
            }
            this.showModal(ev.title, ev.text, ev.options.map(o => ({
                text: o.text,
                cb: () => {
                    if(o.probability !== undefined) {
                        if(Math.random() < o.probability) { p.money += o.impact.money; this.record(p, "投资盈利", o.impact.money); }
                        else { p.money += o.fail_impact.money; this.record(p, "投资亏损", o.fail_impact.money); }
                    } else {
                        if(o.impact) { p.money += o.impact.money; if(o.impact.money!==0) this.record(p, ev.title, o.impact.money); }
                        if(o.installment) {
                            p.money += o.installment.down_payment; this.record(p, ev.title+"(首付)", o.installment.down_payment);
                            p.loans.push({ name: ev.title, amt: o.installment.per_term, left: o.installment.terms });
                        }
                        if(o.asset_data) {
                            p.assets.push({ name: o.asset_data.name, value: o.asset_data.initial_value, rate: o.asset_data.change_rate, perk: o.asset_data.perk });
                            this.applyPerk(p, o.asset_data.perk);
                        }
                        if(o.perk) this.applyPerk(p, o.perk);
                    }
                    this.nextTurn();
                }
            })));
        }

        showSaveSlider(p, ev) {
            const config = ev.options.find(o => o.save_data).save_data;
            this.showModal(ev.title, ev.text + `\n(账户余额: ${p.money}💰)`, []);
            const dynamic = document.getElementById('dynamic-content');
            dynamic.innerHTML = `<div class="slider-container"><input type="range" id="save-slider" min="0" max="${Math.max(0, p.money)}" step="100" value="0"><div class="slider-val"><span id="sv">0</span>💰</div><div id="pv" style="font-size:12px;color:#666">预计回收: 0💰</div></div>`;
            const s = document.getElementById('save-slider');
            s.oninput = () => {
                const val = parseInt(s.value); document.getElementById('sv').innerText = val;
                let est = (config.type === 'simple') ? val * (1 + config.rate * config.lock) : val * Math.pow(1+config.rate, config.lock);
                document.getElementById('pv').innerText = `预计${config.lock}轮后回收共 ${Math.floor(est)}💰`;
            };
            const btn = document.createElement('button'); btn.className = 'choice-btn'; btn.innerText = "确认储蓄";
            btn.onclick = () => {
                const amt = parseInt(s.value);
                if(amt > 0) { p.money -= amt; this.record(p, "划转储蓄", -amt); p.savings.push({ principal: amt, rate: config.rate, type: config.type, left: config.lock }); }
                this.nextTurn();
            };
            document.getElementById('m-opts').appendChild(btn);
            const skip = document.createElement('button'); skip.className = 'choice-btn'; skip.innerText = "先不存"; skip.style.background="#eee"; skip.onclick = () => this.nextTurn();
            document.getElementById('m-opts').appendChild(skip);
        }

        applyPerk(p, perk) {
            if(!perk) return;
            if(perk.type === 'move') p.perks.move = Math.max(p.perks.move, perk.value);
            if(perk.type === 'salary') p.salary += perk.value;
            if(perk.type === 'boost') p.perks.boost *= perk.value;
            if(perk.type === 'shield') p.perks.shield = true;
        }

        record(p, e, a) { if(a!==0) p.history.push({ round: this.round, event: e, change: Math.floor(a) }); }

        async nextTurn() {
            this.closeModal();
            const p = this.players[this.currentPlayer];
            p.assets.forEach(a => a.value = Math.floor(a.value * (1 + a.rate)));
            p.savings.forEach(s => {
                s.left--; if(s.left === 0) {
                    let total = s.type === 'simple' ? s.principal * (1+s.rate*3) : s.principal * Math.pow(1+s.rate, 3);
                    p.money += Math.floor(total); this.record(p, "存款到期", total);
                }
            });
            p.savings = p.savings.filter(s => s.left > 0);
            
            if(p.money <= -1500 && p.frozen === 0) { p.frozen = 2; this.log(`${p.name} 财务枯竭，停工 2 回合`, "error"); }

            this.currentPlayer = (this.currentPlayer + 1) % this.players.length;
            const nextP = this.players[this.currentPlayer];
            if(nextP.money < 0 && nextP.frozen === 0) { let int = Math.ceil(Math.abs(nextP.money)*0.05); nextP.money -= int; this.record(nextP, "欠债罚息", -int); }
            nextP.loans.forEach(l => { if(l.left > 0) { nextP.money -= l.amt; l.left--; this.record(nextP, "还分期款", -l.amt); } });
            nextP.loans = nextP.loans.filter(l => l.left > 0);

            if(this.currentPlayer === 0) { this.round++; if(this.isEnding) this.finalTurns++; }
            if(this.finalTurns >= 2) return this.gameOver();
            await this.sync(); this.updateUI(); this.updatePawns();
        }

        async sync() {
            try { await setDoc(doc(db, "gameData", this.groupId), { groupId: this.groupId, round: this.round, players: this.players.map(p=>({name:p.name, money:p.money, level:p.level, color:p.color, history:p.history})) }); } catch(e){}
        }

        updateUI() {
            document.getElementById('round-tag').innerText = `回合: ${this.round}`;
            const info = document.getElementById('turn-info');
            info.innerText = `轮到：${this.players[this.currentPlayer].name}`;
            info.style.color = this.players[this.currentPlayer].color;
            const bar = document.getElementById('status-bar'); bar.innerHTML = '';
            this.players.forEach((p, i) => {
                const card = document.createElement('div'); card.className = `p-card ${this.currentPlayer === i ? 'active' : ''}`;
                card.style.borderTopColor = p.color; card.onclick = () => this.showJournal(i);
                const assetSum = p.assets.reduce((sum, a) => sum + a.value, 0);
                const savedSum = p.savings.reduce((sum, s) => sum + s.principal, 0);
                card.innerHTML = `<div class="p-name-link">${p.name} (Lv${p.level}) ${p.frozen>0?'🚫停工':''}</div><div class="money" style="color:${p.money<0?'red':'#2ecc71'}">${Math.floor(p.money)}💰</div><div class="detail">实物: ${assetSum} | 存款: ${savedSum}<br>分期: ${p.loans.length}笔 | 工资: ${p.salary}</div>`;
                bar.appendChild(card);
            });
        }

        showJournal(id) {
            const p = this.players[id]; this.showModal(p.name + " 日志", "", [{text:"返回", cb:()=>this.closeModal()}]);
            let h = `<ul class="history-list">` + p.history.slice().reverse().map(x => `<li>[R${x.round}] ${x.event}: <b style="color:${x.change>=0?'green':'red'}">${x.change>=0?'+':''}${x.change}💰</b></li>`).join('') + "</ul>";
            document.getElementById('m-body').innerHTML = h;
        }

        showModal(t, b, opts) {
            document.getElementById('m-title').innerText = t; document.getElementById('m-body').innerHTML = b;
            document.getElementById('dynamic-content').innerHTML = '';
            const container = document.getElementById('m-opts'); container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button'); btn.className = 'choice-btn'; btn.innerText = o.text; btn.onclick = o.cb; container.appendChild(btn);
            });
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        log(msg, type) {
            const p = document.createElement('div'); p.innerText = `> ${msg}`; 
            if(type==="error") p.style.color="red"; if(type==="warn") p.style.color="orange";
            document.getElementById('log').prepend(p);
        }
        requestEnd() { if(confirm("进入结算？")) this.isEnding = true; }
        gameOver() {
            const res = this.players.map(p => ({ name: p.name, total: Math.floor(p.money + p.assets.reduce((s,a)=>s+a.value,0) + p.savings.reduce((s,sv)=>s+sv.principal,0)) })).sort((a,b)=>b.total-a.total);
            alert("🏆 最终结算：\n" + res.map((r,i)=>`${i+1}. ${r.name}: ${r.total}💰`).join('\n'));
            location.reload();
        }
    }
    window.game = new GameEngine();
</script>
</body>
</html>
